<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Totalizador</title>
</head>

<body>

<h1>Totalizador</h1>

<table>

  <tr>
    <td>Cantidad</td>
    <td>
      <input type="number" id="cantidad">
    </td>
  </tr>

  <tr>
    <td>Precio</td>
    <td>
      <input type="number" id="precio">
    </td>
  </tr>

  <tr>
    <td>Código de estado</td>
    <td>
      <select id="estado">
        <option value="CA">CA</option>
        <option value="TX">TX</option>
        <option value="NV">NV</option>
        <option value="UT">UT</option>
        <option value="AL">AL</option>
      </select>
    </td>
  </tr>

  <tr>
    <td>Categoría de producto</td>
    <td>
      <select id="categoria">
        <option value="Varios">Varios</option>
        <option value="Alimentos">Alimentos</option>
        <option value="Bebidas alcohólicas">Bebidas alcohólicas</option>
        <option value="Material de escritorio">Material de escritorio</option>
        <option value="Muebles">Muebles</option>
        <option value="Electrónicos">Electrónicos</option>
        <option value="Vestimenta">Vestimenta</option>
      </select>
    </td>
  </tr>

  <tr>
    <td>Peso volumétrico por unidad</td>
    <td>
      <input type="number" id="pesoVolumetrico">
    </td>
  </tr> 

  <tr>
    <td>Tipo de Cliente</td>
    <td>
      <select id="tipoCliente">
        <option value="normal">Normal</option>
        <option value="recurrente">Recurrente</option>
        <option value="antiguo recurrente">Antiguo Recurrente</option>
        <option value="especial">Especial</option>
      </select>
    </td>
  </tr>

  <tr>
    <td></td>
    <td>
      <button id="totalizar">Totalizar</button>
    </td>
  </tr>

  <tr>
    <td>Precio Neto</td>
    <td id="resultadoNeto"></td>
  </tr>

  <tr>
    <td id="textoDescuento"></td>
    <td id="resultadoDescuento"></td>
  </tr>

  <tr>
    <td id="textoImpuesto"></td>
    <td id="resultadoImpuesto"></td>
  </tr>


  <tr>
    <td id="textoImpuestoAdicional"></td>
    <td id="resultadoImpuestoAdicional"></td>
  </tr>

  <tr>
    <td id="textoDescuentoAdicional"></td>
    <td id="resultadoDescuentoAdicional"></td>
  </tr>

  <tr>
    <td>Costo de envío por unidad</td>
    <td id="resultadoEnvioUnidad"></td>
  </tr>

  <tr>
    <td>Descuento de envío</td>
    <td id="resultadoDescuentoEnvio"></td>
  </tr>

  <tr>
    <td>Costo de envío total</td>
    <td id="resultadoEnvio"></td>
  </tr>

  <tr>
    <td>Descuento especial cliente</td>
    <td id="resultadoDescuentoEspecial"></td>
  </tr>

  <tr>
  <td>Precio total (descuento e impuesto)</td>
  <td id="resultadoTotal"></td>
</tr>

</table>

<script type="module" src="./src/presenter.js"></script>

</body>
</html>
